openapi: 3.1.0
info:
  title: Lithosphere DNNS API
  version: 0.1.0
  description: DNNS reference API for Makalu testnet.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /v1/names/{name}/resolve:
    get:
      summary: Resolve a DNNS name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  node:
                    type: string
                  owner:
                    type: string
                  expiresAt:
                    type: integer
                  resolverAddress:
                    type: string
                  metadataURI:
                    type: string
  /v1/labels/{label}/availability:
    get:
      summary: Check label availability
      parameters:
        - name: label
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                type: object
                properties:
                  label:
                    type: string
                  available:
                    type: boolean
                  priceWei:
                    type: string
                  minRegistrationDuration:
                    type: integer
                  gracePeriod:
                    type: integer
